# 线上地推组 - 数据推送 GitLab CI 定时任务
# 每小时第7分钟自动推送站点数据到 LATEST_PUSH.md

stages:
  - push

push_update:
  stage: push
  image: python:3.11
  script:
    - pip install openpyxl
    - python push_update.py
    - python push_update_en.py
  artifacts:
    paths:
      - LATEST_PUSH.md
      - LATEST_PUSH_EN.md
    expire_in: 7 days
  only:
    - schedules
  tags:
    - windows
